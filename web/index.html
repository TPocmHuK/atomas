<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#101522" />
  <title>Atomas Clone</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://yandex.ru/games/sdk/v2"></script>
</head>
<body>
  <div id="hud">
    <div id="score-box">
      <span class="label" data-i18n="score">Счёт</span>
      <span id="score">0</span>
    </div>
    <div id="best-box">
      <span class="label" data-i18n="best">Рекорд</span>
      <span id="best">0</span>
    </div>
    <button id="restart" class="hud-btn" data-i18n-title="restart" title="Заново" aria-label="Заново">⟳</button>
  </div>

  <div id="stage">
    <canvas id="game"></canvas>
  </div>

  <div id="hint" data-i18n="hint">Коснитесь места между атомами</div>

  <div id="modal" class="hidden" role="dialog" aria-modal="true">
    <div class="card">
      <h2 data-i18n="gameOver">Игра окончена</h2>
      <p><span data-i18n="finalScore">Ваш счёт</span>: <b id="final-score">0</b></p>
      <p id="new-best" class="hidden" data-i18n="newBest">Новый рекорд!</p>
      <div class="actions">
        <button id="continue-btn" class="primary" data-i18n="continueAd">Продолжить за рекламу</button>
        <button id="replay-btn" data-i18n="playAgain">Заново</button>
      </div>
    </div>
  </div>

  <script src="js/i18n.js"></script>
  <script src="js/atoms.js"></script>
  <script src="js/game.js"></script>
  <script src="js/render.js"></script>
  <script src="js/ysdk.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
